<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>F1 Streams</title>

<link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
height:100%;
background:black;
font-family:Arial;
}

.container{
height:100vh;
display:flex;
flex-direction:column;
}

.stream-box{
flex:1;
display:flex;
flex-direction:column;
}

.label{
background:#111;
color:white;
text-align:center;
padding:5px;
}

iframe{
flex:1;
border:none;
}

.player{
flex:1;
}

.video-js{
width:100%;
height:100%;
}

</style>

</head>

<body>

<div class="container">

<div class="stream-box">

<div class="label">Stream 1</div>

<iframe 
src="https://pooembed.eu/embed/f1/2026/china/sprint"
allowfullscreen>
</iframe>

</div>

<div class="stream-box">

<div class="label">Stream 2</div>

<div class="player">

<video
id="f1player"
class="video-js"
controls
autoplay>

<source 
src="https://hakunamatata5.org:8088/hls/sky-f1.m3u8"
type="application/x-mpegURL">

</video>

</div>

</div>

</div>

<script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>

<script>

document.addEventListener("DOMContentLoaded", function(){

videojs('f1player',{
fluid:true,
liveui:true
});

});

</script>

</body>

</html>
